<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/game.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script type="module" src="client.js"></script>
    <title>Rozgrywka</title>
  </head>
  <body>
    <div id="main">
      <div id="chessboard">
        <div class="popup">
          <div class="popup-content">
            <img />
            <img />
            <img />
            <img />
          </div>
        </div>
        <div id="loader-container">
          <p>Oczekiwanie na przeciwnika</p>
          <div id="loader"></div>
        </div>
      </div>
      <div class="ui">
        <div class="timer timer-top">10:00</div>
        <div class="options">
          <div id="surrender" class="btn">
            <span>Poddaj się</span>
            <img id="flag" src="/icons/flag.png" />
          </div>
          <div id="draw" class="btn">
            <span>Zaproponuj remis</span>
            <span id="half">&#189;</span>
          </div>
          <div id="drawRequest" class="btn disabled">Zaproponowano remis</div>
          <div id="drawOffer">
            <div class="btn disabled">Przeciwnik zaproponował remis</div>
            <div id="draw-options">
              <div id="accept-draw" class="btn draw-option">
                <span>Akceptuj</span>
              </div>
              <div id="reject-draw" class="btn draw-option">
                <span>Odrzuć</span>
              </div>
            </div>
          </div>
          <div id="gameOverElements">
            <h2 id="gameOverMessage"></h2>
            <div id="goBack" class="btn">Wróć na stronę główną</div>
          </div>
        </div>
        <div class="timer timer-bottom">10:00</div>
      </div>
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
